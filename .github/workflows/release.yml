name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: polling2webhook-linux-amd64
          - goos: linux
            goarch: arm64
            name: polling2webhook-linux-arm64
          - goos: darwin
            goarch: amd64
            name: polling2webhook-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: polling2webhook-darwin-arm64
          - goos: windows
            goarch: amd64
            name: polling2webhook-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.name }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            polling2webhook-linux-amd64
            polling2webhook-linux-arm64
            polling2webhook-darwin-amd64
            polling2webhook-darwin-arm64
            polling2webhook-windows-amd64.exe
          generate_release_notes: true
