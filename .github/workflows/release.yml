name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o polling2webhook.exe .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: polling2webhook.exe
          generate_release_notes: true
